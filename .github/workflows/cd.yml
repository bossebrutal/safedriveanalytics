name: CD – Deploy to Google Cloud Run

on:
  push:
    branches: ["main"]  # CD deployar BARA till GCP vid push till main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-north1
  MLFLOW_SERVICE: safedriveanalytics-mlflow
  API_SERVICE: safedriveanalytics-api
  DASHBOARD_SERVICE: safedriveanalytics-dashboard
  ARTIFACT_BUCKET: safedriveanalytics-mlflow-artifacts

jobs:
  migrate-database:
    name: Run DB Migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install postgresql-client
        run: sudo apt-get install -y -q postgresql-client

      - name: Run schema migrations
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        run: |
          echo "Applying schema.sql to ${POSTGRES_DB}..."
          PGPASSWORD="${POSTGRES_PASSWORD}" psql \
            -h "${POSTGRES_HOST}" \
            -U "${POSTGRES_USER}" \
            -d "${POSTGRES_DB}" \
            -f database/schema.sql \
            -v ON_ERROR_STOP=1
          echo "✓ Migrations complete"

  deploy-mlflow:
    name: Deploy MLflow
    runs-on: ubuntu-latest
    needs: migrate-database
    outputs:
      mlflow_url: ${{ steps.get_url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create GCS bucket for MLflow artifacts
        run: gsutil mb -p ${{ env.PROJECT_ID }} -l ${{ env.REGION }} gs://${{ env.ARTIFACT_BUCKET }} || true

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build & push MLflow image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/safedriveanalytics/${{ env.MLFLOW_SERVICE }}:${{ github.sha }}"
          docker build -f mlflow/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Smoke test MLflow image
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/safedriveanalytics/${{ env.MLFLOW_SERVICE }}:${{ github.sha }}"
          POSTGRES_PASSWORD_B64=$(printf '%s' "${POSTGRES_PASSWORD}" | base64 -w0)
          docker run -d --name mlflow-smoke \
            -e POSTGRES_HOST="${POSTGRES_HOST}" \
            -e POSTGRES_USER="${POSTGRES_USER}" \
            -e POSTGRES_PASSWORD_B64="${POSTGRES_PASSWORD_B64}" \
            -e MLFLOW_ARTIFACT_BUCKET="${{ env.ARTIFACT_BUCKET }}" \
            -e PORT=5000 \
            -p 5000:5000 \
            "$IMAGE"
          echo "Waiting for MLflow to start..."
          for i in $(seq 1 18); do
            sleep 5
            if curl -sf http://localhost:5000/health 2>/dev/null; then
              echo "✓ MLflow smoke test passed"
              docker stop mlflow-smoke && docker rm mlflow-smoke
              exit 0
            fi
            STATUS=$(docker inspect -f '{{.State.Status}}' mlflow-smoke 2>/dev/null)
            if [[ "$STATUS" == "exited" ]]; then
              echo "✗ Container exited early. Logs:"
              docker logs mlflow-smoke
              docker rm mlflow-smoke
              exit 1
            fi
            echo "  attempt $i/18 – container status: $STATUS"
          done
          echo "✗ MLflow did not respond in 90s. Logs:"
          docker logs mlflow-smoke
          docker stop mlflow-smoke && docker rm mlflow-smoke
          exit 1

      - name: Deploy MLflow to Cloud Run
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/safedriveanalytics/${{ env.MLFLOW_SERVICE }}:${{ github.sha }}"
          # Base64-encode password so any special chars survive --set-env-vars parsing
          POSTGRES_PASSWORD_B64=$(printf '%s' "${POSTGRES_PASSWORD}" | base64 -w0)
          gcloud run deploy ${{ env.MLFLOW_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 5000 \
            --memory 2Gi \
            --cpu 2 \
            --cpu-boost \
            --set-env-vars "POSTGRES_HOST=${POSTGRES_HOST},POSTGRES_USER=${POSTGRES_USER},POSTGRES_PASSWORD_B64=${POSTGRES_PASSWORD_B64},MLFLOW_ARTIFACT_BUCKET=${{ env.ARTIFACT_BUCKET }}"

      - name: Show Cloud Run logs on failure
        if: failure()
        run: |
          echo "=== Cloud Run container logs ==="
          gcloud run services logs read ${{ env.MLFLOW_SERVICE }} \
            --region ${{ env.REGION }} \
            --limit 50 || true

      - name: Get MLflow URL
        id: get_url
        run: |
          URL=$(gcloud run services describe ${{ env.MLFLOW_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

  deploy-api:
    name: Deploy ML API
    runs-on: ubuntu-latest
    needs: deploy-mlflow

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build & push API image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/safedriveanalytics/${{ env.API_SERVICE }}:${{ github.sha }}"
          docker build -f api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy API to Cloud Run
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/safedriveanalytics/${{ env.API_SERVICE }}:${{ github.sha }}"
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "POSTGRES_HOST=${POSTGRES_HOST},POSTGRES_DB=${POSTGRES_DB},POSTGRES_USER=${POSTGRES_USER},POSTGRES_PASSWORD=${POSTGRES_PASSWORD},MLFLOW_TRACKING_URI=${{ needs.deploy-mlflow.outputs.mlflow_url }},MLFLOW_MODEL_NAME=SafeDriveModel"

  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: [deploy-mlflow, deploy-api]

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build & push Dashboard image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/safedriveanalytics/${{ env.DASHBOARD_SERVICE }}:${{ github.sha }}"
          docker build -f dashboard/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Get API URL
        id: get_api_url
        run: |
          URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Deploy Dashboard to Cloud Run
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/safedriveanalytics/${{ env.DASHBOARD_SERVICE }}:${{ github.sha }}"
          gcloud run deploy ${{ env.DASHBOARD_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8501 \
            --set-env-vars "POSTGRES_HOST=${POSTGRES_HOST},POSTGRES_DB=${POSTGRES_DB},POSTGRES_USER=${POSTGRES_USER},POSTGRES_PASSWORD=${POSTGRES_PASSWORD},API_URL=${{ steps.get_api_url.outputs.url }},MLFLOW_TRACKING_URI=${{ needs.deploy-mlflow.outputs.mlflow_url }},MLFLOW_MODEL_NAME=SafeDriveModel"

  deploy-jobs:
    name: Deploy Pipeline Jobs
    runs-on: ubuntu-latest
    needs: [migrate-database, deploy-mlflow]

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build & push Jobs image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/safedriveanalytics/pipeline-jobs:${{ github.sha }}"
          docker build -f jobs/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy Cloud Run Jobs
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MLFLOW_URL: ${{ needs.deploy-mlflow.outputs.mlflow_url }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/safedriveanalytics/pipeline-jobs:${{ github.sha }}"
          BASE_ENV="POSTGRES_HOST=${POSTGRES_HOST},POSTGRES_DB=${POSTGRES_DB},POSTGRES_USER=${POSTGRES_USER},POSTGRES_PASSWORD=${POSTGRES_PASSWORD},POSTGRES_PORT=5432"
          MLFLOW_ENV="MLFLOW_TRACKING_URI=${MLFLOW_URL}"

          for JOB in smhi-ingestion trafikverket-ingestion transformation ml-training; do
            if [[ "$JOB" == "ml-training" ]]; then
              JOB_ENV="${BASE_ENV},${MLFLOW_ENV},JOB_NAME=${JOB}"
            else
              JOB_ENV="${BASE_ENV},JOB_NAME=${JOB}"
            fi

            gcloud run jobs deploy "pipeline-${JOB}" \
              --image "$IMAGE" \
              --region ${{ env.REGION }} \
              --set-env-vars "$JOB_ENV" \
              --memory 512Mi \
              --cpu 1 \
              --max-retries 2 \
              --task-timeout 600 \
              --quiet
            echo "✓ pipeline-${JOB} deployed"
          done

      - name: Set up Cloud Scheduler
        run: |
          # Hämta service account email för Cloud Run Jobs
          SA="github-actions@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"

          # Funktion: skapa eller uppdatera scheduler-jobb
          # Cloud Scheduler stödjer inte europe-north1 – använder europe-west1
          SCHEDULER_REGION="europe-west1"
          upsert_scheduler() {
            local NAME=$1
            local SCHEDULE=$2
            local JOB=$3

            JOB_URL="https://${{ env.REGION }}-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${{ env.PROJECT_ID }}/jobs/${JOB}:run"

            if gcloud scheduler jobs describe "$NAME" --location=${SCHEDULER_REGION} &>/dev/null; then
              gcloud scheduler jobs update http "$NAME" \
                --location=${SCHEDULER_REGION} \
                --schedule="$SCHEDULE" \
                --uri="$JOB_URL" \
                --oauth-service-account-email="$SA" \
                --time-zone="Europe/Stockholm" \
                --quiet
            else
              gcloud scheduler jobs create http "$NAME" \
                --location=${SCHEDULER_REGION} \
                --schedule="$SCHEDULE" \
                --uri="$JOB_URL" \
                --oauth-service-account-email="$SA" \
                --time-zone="Europe/Stockholm" \
                --quiet
            fi
            echo "✓ scheduler ${NAME} (${SCHEDULE})"
          }

          # SMHI: varje timme vid :00
          upsert_scheduler "schedule-smhi-ingestion"         "0 * * * *"    "pipeline-smhi-ingestion"
          # Trafikverket: var 15:e minut
          upsert_scheduler "schedule-trafikverket-ingestion" "*/15 * * * *"  "pipeline-trafikverket-ingestion"
          # Transformation: varje timme vid :10 (efter SMHI-insamling)
          upsert_scheduler "schedule-transformation"         "10 * * * *"   "pipeline-transformation"
          # ML-träning: dagligen kl 02:00
          upsert_scheduler "schedule-ml-training"            "0 2 * * *"    "pipeline-ml-training"

